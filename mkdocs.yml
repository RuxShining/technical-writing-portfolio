site_name: Ruxandra Technical Writing Portfolio
site_description: Technical Writing Samples and Documentation Portfolio
theme:
  name: material
  palette:
    primary: brown
    accent: orange
  features:
    - navigation.tabs
    - navigation.sections
    - search.highlight
nav:
  - About:
      - About Me: about/about-me.md

  - API Documentation:
      - Claude API: api-docs/claude-api.md
      - Payment Gateway: api-docs/payment-gateway.md

  - Process Documentation:
      - Release Workflow: process-docs/release-workflow.md
      - Managing Release Documentation: process-docs/managing-release-documentation.md

  - Release Notes:
      - Enterprise Platform 4.8: release-notes/enterprise-platform-4-8.md

  - User Guides:
      - FitPro Smartwatch: user-guides/FitPro-smartwatch.md
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
